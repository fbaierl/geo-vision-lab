services:
  ollama:
    image: ollama/ollama:latest
    container_name: geovision-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull qwen3.5:9b &&
             ollama pull qwen3.5:4b &&
             ollama pull qwen3.5:0.8b &&
             wait"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s

  mongodb:
    image: mongodb/mongodb-atlas-local:8.2
    container_name: geovision-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
      - mongodb_mongot:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-express:
    image: mongo-express:latest
    container_name: geovision-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://geovision-mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=geovision
    depends_on:
      mongodb:
        condition: service_healthy


  ingest:
    build: .
    container_name: geovision-ingest
    volumes:
      - ./documents:/app/documents
    environment:
      - MONGODB_URI=mongodb://geovision-mongodb:27017/geovision
      - OLLAMA_HOST=http://geovision-ollama:11434
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: python -m app.ingestion.ingest
    restart: "no"

  app:
    build: .
    container_name: geovision-app
    volumes:
      - .:/app
    environment:
      - OLLAMA_HOST=http://geovision-ollama:11434
      - MONGODB_URI=mongodb://geovision-mongodb:27017/geovision
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.services.setup_mongodb && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # --- Monitoring Stack ---

  loki:
    image: grafana/loki:latest
    container_name: geovision-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: geovision-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: geovision-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=geovision
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - loki

  dozzle:
    image: amir20/dozzle:latest
    container_name: geovision-dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_configdb:
  mongodb_mongot:
  ollama_data:
  loki_data:
  grafana_data:
